name: Deploy to Cloudflare Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject secrets + Deploy
        run: |
          sed -i "s|\[YOUR_SUPABASE_ANON_KEY]|\${{ secrets.SUPABASE_ANON_KEY }}|g" js/data.js
          sed -i "s|\[YOUR_COS_SECRET_ID]|\${{ secrets.COS_SECRET_ID }}|g" js/data.js
          sed -i "s|\[YOUR_COS_SECRET_KEY]|\${{ secrets.COS_SECRET_KEY }}|g" js/data.js
          sed -i "s|\[YOUR_SUPABASE_ANON_KEY]|\${{ secrets.SUPABASE_ANON_KEY }}|g" js/data2.js
          sed -i "s|\[YOUR_COS_SECRET_ID]|\${{ secrets.COS_SECRET_ID }}|g" js/data2.js
          sed -i "s|\[YOUR_COS_SECRET_KEY]|\${{ secrets.COS_SECRET_KEY }}|g" js/data2.js
          echo "Secrets injected. data2.js has key: $(grep -c 'sb_publiable' js/data2.js)"

          # Use wrangler CLI directly
          npm install -g wrangler@3
          wrangler pages deploy . --project-name=food-display --branch=master --commit-message="Deploy with secrets injected"