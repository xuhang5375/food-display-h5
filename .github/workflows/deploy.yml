name: Deploy to Cloudflare Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject secrets into data.js
        run: |
          sed -i "s|\[YOUR_SUPABASE_ANON_KEY\]|${{ secrets.SUPABASE_ANON_KEY }}|g" js/data.js
          sed -i "s|\[YOUR_COS_SECRET_ID\]|${{ secrets.COS_SECRET_ID }}|g" js/data.js
          sed -i "s|\[YOUR_COS_SECRET_KEY\]|${{ secrets.COS_SECRET_KEY }}|g" js/data.js

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: food-display
          directory: '.'
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
