name: Deploy to Cloudflare Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject secrets + Deploy
        run: |
          sed -i "s|\[YOUR_SUPABASE_ANON_KEY]|\${{ secrets.SUPABASE_ANON_KEY }}|g" js/data.js
          sed -i "s|\[YOUR_COS_SECRET_ID]|\${{ secrets.COS_SECRET_ID }}|g" js/data.js
          sed -i "s|\[YOUR_COS_SECRET_KEY]|\${{ secrets.COS_SECRET_KEY }}|g" js/data.js
          sed -i "s|\[YOUR_SUPABASE_ANON_KEY]|\${{ secrets.SUPABASE_ANON_KEY }}|g" js/data2.js
          sed -i "s|\[YOUR_COS_SECRET_ID]|\${{ secrets.COS_SECRET_ID }}|g" js/data2.js
          sed -i "s|\[YOUR_COS_SECRET_KEY]|\${{ secrets.COS_SECRET_KEY }}|g" js/data2.js
          echo "Secrets injected. Verifying..."
          grep -c "sb_publiable\|SUPABASE_ANON_KEY" js/data2.js || echo "Key not found in data2.js"

          # Use wrangler CLI directly - bypasses action bundling issues
          npm install -g wrangler
          npx wrangler pages deploy . --project-name=food-display --branch=master