name: Test CF Token

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check secrets
        run: |
          echo "CF_ACCOUNT_ID length: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          echo "CF_TOKEN length: ${{ secrets.CLOUDFLARE_API_TOKEN }}"
          echo "SUPABASE_KEY length: ${{ secrets.SUPABASE_ANON_KEY }}"
          echo "COS_ID length: ${{ secrets.COS_SECRET_ID }}"
          echo "COS_KEY length: ${{ secrets.COS_SECRET_KEY }}"
          echo "=== Test CF Token ==="
          curl -s -X GET "https://api.cloudflare.com/client/v4/user/tokens/verify" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json"