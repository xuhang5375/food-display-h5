name: Deploy CF v4

on:
  push:
    paths:
      - "index.html"
      - "css/"
      - "js/"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Clean files
        run: |
          find . -type f ! -path "./.git/*" ! -path "./node_modules/*" ! -path "./.github/*" -exec perl -i -pe "s/\xEF\xBB\xBF//g; s/\xC2\xBF//g" {} \;

      - name: Inject secrets
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          COS_ID: ${{ secrets.COS_SECRET_ID }}
          COS_KEY: ${{ secrets.COS_SECRET_KEY }}
        run: |
          for f in $(find js -name "*.js"); do
            sed -i "s|@YOUR_SUPABASE_ANON_KEY@|${SUPABASE_KEY}|g" "$f"
            sed -i "s|@YOUR_COS_SECRET_ID@|${COS_ID}|g" "$f"
            sed -i "s|@YOUR_COS_SECRET_KEY@|${COS_KEY}|g" "$f"
          done

      - name: Install wrangler
        run: npm install -g wrangler@3

      - name: Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler pages project list
          wrangler pages deploy . --project-name=food-display --commit-message="Deploy from Actions"