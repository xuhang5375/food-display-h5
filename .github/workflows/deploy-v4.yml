name: Deploy CF v4

on:
  push:
    paths:
    - index.html
    - css/
    - js/
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Remove all BOM types
        run: |
          python3 -c "
          import os, sys
          for root, dirs, files in os.walk('.'):
              dirs[:] = [d for d in dirs if d not in ['.git','node_modules','.github']]
              for fn in files:
                  path = os.path.join(root, fn)
                  with open(path, 'rb') as f:
                      data = f.read()
                  # Remove UTF-8 BOM, UTF-16 LE, UTF-16 BE
                  if data.startswith(b'\xef\xbb\xbf'):
                      data = data[3:]
                  elif data.startswith(b'\xff\xfe'):
                      data = data[2:]
                  elif data.startswith(b'\xfe\xff'):
                      data = data[2:]
                  with open(path, 'wb') as f:
                      f.write(data)
          print('Done')
          "

      - name: Inject secrets
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          COS_ID: ${{ secrets.COS_SECRET_ID }}
          COS_KEY: ${{ secrets.COS_SECRET_KEY }}
        run: |
          for f in $(find js -name "*.js"); do
            sed -i "s|@YOUR_SUPABASE_ANON_KEY@|${SUPABASE_KEY}|g" "$f"
            sed -i "s|@YOUR_COS_SECRET_ID@|${COS_ID}|g" "$f"
            sed -i "s|@YOUR_COS_SECRET_KEY@|${COS_KEY}|g" "$f"
          done

      - name: Deploy via CF REST API
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "Creating CF Pages deployment..."
          RESP=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT}/pages/projects/food-display/deployments" \
            -H "Authorization: Bearer ${CF_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"branch\":\"master\",\"skipGitIntegration\":true,\"manifest\":{}}")
          echo "Create response: $RESP"
          DEP_ID=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['result']['id'])" 2>/dev/null)
          echo "Deployment ID: $DEP_ID"

          echo "Uploading files..."
          for file in $(find . -type f ! -path "./.git/*" ! -path "./node_modules/*" ! -path "./.github/*"); do
            CONTENT=$(base64 -w 0 "$file")
            echo "  Uploading $file..."
            UPLOAD=$(curl -s -X POST \
              "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT}/pages/projects/food-display/deployments/${DEP_ID}/upload" \
              -H "Authorization: Bearer ${CF_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"manifest\":{\"${file}\":{\"content\":\"${CONTENT}\"}}}")
            echo "  Result: $UPLOAD"
          done